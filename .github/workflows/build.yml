name: Build

on:
  push:
    branches: [ main, copilot/* ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install

    - name: Build all packages (generates types + catalog, bundles the MCP CLI)
      run: bun run build

    - name: Type check (core)
      run: bun x tsc --noEmit -p packages/core/tsconfig.json

    - name: Type check examples (core)
      run: bun x tsc --noEmit -p packages/core/tsconfig.examples.json

    - name: Type check (mcp)
      run: bun x tsc --noEmit -p packages/mcp/tsconfig.json

    - name: Upload MCP build artifact
      uses: actions/upload-artifact@v4
      with:
        name: mcp-dist
        path: packages/mcp/dist/
        retention-days: 7
