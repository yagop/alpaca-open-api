name: Node 24

on:
  push:
    branches: [ main, copilot/* ]
  pull_request:
    branches: [ main ]

jobs:
  node24:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node 24
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install

    - name: Build all packages (generates types + catalog, bundles the MCP CLI)
      run: bun run build

    - name: Smoke test the bundled MCP CLI on Node 24
      # The published artifact is the bundled CLI; confirm it boots on Node 24.
      run: |
        node packages/mcp/dist/mcp.js --version
        node packages/mcp/dist/mcp.js --help

    - name: Functional test — build the catalog and start the server on Node 24
      # Exercises loadCatalog() (live fetch + cache) and a full MCP handshake
      # against the bundled server, all under Node 24.
      run: node packages/mcp/scripts/smoke.mjs
