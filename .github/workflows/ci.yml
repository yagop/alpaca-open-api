name: CI

on:
  push:
    branches: [ main, copilot/* ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node 24
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install

    - name: Build all packages (generates types + tool manifest, bundles the MCP CLI)
      run: bun run build

    - name: Type check (core)
      run: bun x tsc --noEmit -p packages/core/tsconfig.json

    - name: Type check examples (core)
      run: bun x tsc --noEmit -p packages/core/tsconfig.examples.json

    - name: Type check (mcp)
      run: bun x tsc --noEmit -p packages/mcp/tsconfig.json

    - name: Smoke test the bundled MCP CLI on Node 24
      # The published artifact is the bundled CLI; confirm it boots on Node 24.
      run: |
        node packages/mcp/dist/mcp.js --version
        node packages/mcp/dist/mcp.js --help

    - name: Functional test — start the server and list every tool on Node 24
      # Completes a full MCP handshake against the bundled server (offline — the
      # tool manifest ships in the bundle) and asserts the endpoint surface.
      run: node packages/mcp/scripts/smoke.mjs

    - name: Upload MCP build artifact
      uses: actions/upload-artifact@v4
      with:
        name: mcp-dist
        path: packages/mcp/dist/
        retention-days: 7
